services:
  app:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://pokeapi:pokeapi_local_docker_dev_only@db:5432/pokeapi
      - REDIS_URL=redis://redis:6379/0
      - FLASK_ENV=${FLASK_ENV:-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - app-logs:/app/logs
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/pokedexapi.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=pokeapi
      # Local Docker only — not a production secret (see .gitguardian.yml)
      - POSTGRES_PASSWORD=pokeapi_local_docker_dev_only
      - POSTGRES_DB=pokeapi
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokeapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  app-logs:
