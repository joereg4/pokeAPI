{% extends 'base.html' %}

{% block title %}Move Category List{% endblock %}

{% block content %}
    <h1>Move Category List</h1>
    <ul>
        {% for category in category_list %}
            <li><a href="{{ url_for('pokemon.get_move_category', id_or_name=category.name) }}">{{ category.name }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
