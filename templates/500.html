{% extends "base.html" %}

{% block title %}500 Internal Server Error{% endblock %}

{% block content %}
<section class="container text-center">
    <div class="px-3 py-4 px-sm-4 py-sm-5">
        <h1 class="text-danger display-2 bg-text-primary">500</h1>
        {% if message %}
        <p class="lead bg-text-primary">{{ message }}</p>
        {% else %}
        <p class="lead bg-text-primary">Oops! Something went wrong on our end.</p>
        {% endif %}
        <p class="text-muted">Our team has been notified and is working to fix the issue.</p>
        <a href="{{ url_for('pokemon.get_pokemon_list', page=1) }}" class="btn btn-primary">Return to Home</a>
    </div>
</section>
{% endblock %}
