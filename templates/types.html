{% extends 'base.html' %}

{% block title %}Pokémon Types{% endblock %}

{% block content %}
<div class="types-section">
    <h1>Pokémon Types</h1>
    <ul class="types-list">
        {% for type in types %}
            <li><a href="{{ url_for('pokemon.get_type', id_or_name=type.name) }}">{{ type.name }}</a></li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
