{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Summary Preview for {{ resource.name }}</h2>
        <a href="{{ return_to }}" 
           class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>
    
    <div class="row">
        <div class="col-md-6">
            <h4>Current Summary</h4>
            <div class="card">
                <div class="card-body">
                    {{ resource.summary | markdown | safe }}
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <h4>New Summary (Edit)</h4>
            <div class="card">
                <div class="card-body">
                    <textarea class="form-control" name="edited_summary" rows="10" 
                             form="accept-form" 
                             id="markdown-editor"
                             oninput="updatePreview()">{{ new_summary }}</textarea>
                </div>
            </div>
            <h4 class="mt-3">Preview</h4>
            <div class="card">
                <div class="card-body" id="markdown-preview">
                </div>
            </div>
        </div>
    </div>
    
    <div class="mt-4">
        {% if not is_edit_mode %}
        <form method="POST" class="mb-3" action="{{ url_for('summary_review.update_summary', 
                                                           resource=resource.resource, 
                                                           name=resource.name,
                                                           return_to=return_to) }}">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text">Max Tokens:</span>
                        <input type="number" class="form-control" name="max_tokens" 
                               value="{{ max_tokens|default(2000) }}" min="100" max="8000">
                    </div>
                </div>
                <div class="col-md-8">
                    <textarea class="form-control" name="custom_instructions" 
                              placeholder="Add custom instructions for the AI (optional)"
                              rows="2">{{ custom_instructions|default('') }}</textarea>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Regenerate with Instructions</button>
                </div>
            </div>
        </form>
        {% endif %}

        <form id="accept-form" method="POST" action="{{ url_for('summary_review.update_summary', 
                                              resource=resource.resource, 
                                              name=resource.name,
                                              return_to=return_to) }}">
            <input type="hidden" name="action" value="accept">
            <button type="submit" class="btn btn-success">Accept Summary</button>
            <a href="{{ return_to }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

<script>
    function updatePreview() {
        const editor = document.getElementById('markdown-editor');
        const preview = document.getElementById('markdown-preview');
        
        // Send the markdown to our server endpoint to render
        fetch("{{ url_for('summary_review.render_markdown') }}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({text: editor.value})
        })
        .then(response => response.text())
        .then(html => {
            preview.innerHTML = html;
        });
    }
    
    // Initial preview
    document.addEventListener('DOMContentLoaded', updatePreview);
</script>
{% endblock %}
