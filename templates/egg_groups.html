{% extends 'base.html' %}

{% block title %}Pokémon Egg Groups{% endblock %}

{% block content %}
    <div class="container pt-5">
        <h1>Egg Groups</h1>
    </div>
    <div class="container pt-5">
        <ul>
            {% for type in data %}
                <li><a href="{{ url_for('pokemon.get_egg_group', id_or_name=type.name) }}">{{ type.name | title }}</a></li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
