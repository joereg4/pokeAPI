{% extends 'base.html' %}

{% block title %}Pokémon Berries{% endblock %}

{% block content %}
    <div class="container pt-5">
        <h1>Pokémon Berries</h1>
    </div>
    <div class="container pt-5">
        <ul>
            {% for berry in data %}
                <li>
                    <a href="{{ url_for('pokemon.get_berry', id_or_name=berry.name) }}">{{ berry.name | capitalize }}</a>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
