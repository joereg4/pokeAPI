{% extends 'base.html' %}

{% block title %}Pokémon Versions{% endblock %}

{% block content %}
    <div class="container pt-5">
        <h1>Pokémon Version Groups</h1>
    </div>
    <div class="container pt-5">
        <ul>
            {% for data in data %}
                <li>
                    <a href="{{ url_for('pokemon.get_version_group', id_or_name=data.name) }}">{{ data.name | capitalize }}</a>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
