{% extends "base.html" %}

{% block title %}429 Too Many Requests{% endblock %}

{% block content %}
<section class="container text-center">
    <div class="px-3 py-4 px-sm-4 py-sm-5">
        <h1 class="text-danger display-2 bg-text-primary">
            <i class="fas fa-exclamation-circle"></i>
            429
        </h1>
        <p class="lead bg-text-primary">Rate Limit Exceeded</p>
        {% if message %}
        <p class="lead bg-text-primary">{{ message }}</p>
        {% endif %}
        <p class="text-muted">Please try again later or consider upgrading your API plan.</p>
        <div class="mt-4">
            <a href="{{ url_for('pokemon.get_pokemon_list', page=1) }}" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Return to Home
            </a>
            <a href="{{ url_for('health.check_cache_health') }}" class="btn btn-outline-secondary ms-2">
                <i class="fas fa-chart-line me-2"></i>Check API Status
            </a>
        </div>
    </div>
</section>
{% endblock %}
