{% extends 'base.html' %}

{% block title %}Rate Limit Exceeded{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-danger">
                <div class="card-body text-center">
                    <h1 class="card-title text-danger mb-4">
                        <i class="fas fa-exclamation-circle"></i>
                        Rate Limit Exceeded
                    </h1>
                    <p class="lead mb-4">{{ message }}</p>
                    <p class="text-muted">Please try again later or consider upgrading your API plan.</p>
                    <div class="mt-4">
                        <a href="{{ url_for('pokemon.index') }}" class="btn btn-primary">
                            <i class="fas fa-home me-2"></i>Return Home
                        </a>
                        <a href="{{ url_for('health.check_cache_health') }}" class="btn btn-outline-secondary ms-2">
                            <i class="fas fa-chart-line me-2"></i>Check API Status
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
