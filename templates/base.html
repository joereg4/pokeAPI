<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokédex API{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('pokemon.static', filename='css/bootstrap.css') }}">
    <link rel="stylesheet" href="{{ url_for('pokemon.static', filename='css/styles.css') }}">
    <!-- Include jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 16x16 and 32x32 PNG icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16x16.png') }}">
    <!-- Apple Touch Icon for iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">
    <!-- Safari Pinned Tab Icon -->
    <link rel="mask-icon" href="{{ url_for('static', filename='img/safari-pinned-tab.svg') }}" color="#EF5350">

</head>
<body>
<header>
    <nav class="navbar navbar-expand-xl  bg-danger">
        <div class="container-fluid">
            <a class="navbar-brand" href="/" title="Pokémon API">
                <img src="{{ url_for('pokemon.static', filename='img/pokedexlogo.png') }}" alt="Pokémon"
                     class="img-fluid" style="max-height: 40px;">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggler"
                    aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarToggler">
                <div class="navbar-nav ms-auto mb-2 mb-lg-0 gap-lg-3">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
                    <a class="nav-link {% if request.path.startswith('/pokemon/') %}active{% endif %}"
                       href="{{ url_for('pokemon.get_pokemon_list',page=1) }}">Pokémon</a>
                    <a class="nav-link {% if request.path == url_for('abilities_moves_items.get_ability') %}active{% endif %}"
                       href="{{ url_for('abilities_moves_items.get_ability') }}">Abilities</a>
                    <a class="nav-link {% if request.path == url_for('characteristics_stats.get_type') %}active{% endif %}"
                       href="{{ url_for('characteristics_stats.get_type') }}">Types</a>
                    <a class="nav-link {% if request.path == url_for('pokemon.get_pokemon_color') %}active{% endif %}"
                       href="{{ url_for('pokemon.get_pokemon_color') }}">Colors</a>
                    <a class="nav-link {% if request.path == url_for('pokemon.get_pokemon_habitat') %}active{% endif %}"
                       href="{{ url_for('pokemon.get_pokemon_habitat') }}">Habitats</a>
                    <a class="nav-link {% if request.path == url_for('pokemon.get_pokemon_shape') %}active{% endif %}"
                       href="{{ url_for('pokemon.get_pokemon_shape') }}">Shapes</a>
                    <a class="nav-link {% if request.path == url_for('pokemon.get_detective_pikachu_pokemon') %}active{% endif %}"
                       href="{{ url_for('pokemon.get_detective_pikachu_pokemon') }}">Detective Pikachu</a>
                </div>
                {% include 'search.html' %}
            </div>
        </div>
    </nav>
</header>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<footer class="bg-light text-center py-4">
    <div class="container">
        <p>Created by <a href="https://github.com/joereg4">Joe Regenstein</a>, thank you PokéAPI. Pokémon and Pokémon
            character names are trademarks of Nintendo.</p>
    </div>
    <script>
        const resources = {{ resources_json | safe }};
        console.log(resources);  // Check if the data is loaded
        console.log(Array.isArray(resources));  // This should log `true` if `resources` is an array
    </script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.js') }}"></script>
</footer>
</body>
</html>
