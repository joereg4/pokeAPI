<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pokédex API{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('pokemon.static', filename='css/styles.css') }}">

    <!-- Include jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<header>
    <div class="header-wrapper">
        <a href="/" title="Pokémon API"><img src="{{ url_for('pokemon.static', filename='img/pokedexlogo.png') }}"
                                             alt="Pokémon"></a>
        <nav>
            <a href="/">Home</a>
            <a href="{{ url_for('pokemon.get_pokemon_list',page=1) }}">Pokémon</a>
            <a href="{{ url_for('pokemon.get_abilities_list') }}">Abilities</a>
            <a href="{{ url_for('pokemon.get_types_list') }}">Types</a>
            <a href="{{ url_for('pokemon.get_colors_list') }}">Colors</a>
            <a href="{{ url_for('pokemon.get_habitats_list') }}">Habitats</a>
            {% include 'search.html' %}
        </nav>
    </div>
</header>

<div class="main-section">
    {% block content %}{% endblock %}
</div>
<footer>
    <div class="footer-container">
        <div>Created by <a href="https://joereg4.github.io/">Joe Regenstein</a>, thank you PokéAPI. Pokémon and Pokémon
            character names are trademarks of Nintendo.
        </div>
    </div>
</footer>
<script>
    const resources = {{ resources_json | safe }};
    console.log(resources);  // Check if the data is loaded
    console.log(Array.isArray(resources));  // This should log `true` if `resources` is an array
</script>
</body>
</html>
