{% extends 'base.html' %}

{% block title %}Pokémon List{% endblock %}

{% block content %}
    <h1 class="pokemon-list__title">Pokémon List</h1>
    {% include '_pokemon_list.html' %}
<nav aria-label="Page navigation">
    <ul class="pagination justify-content-center">
        <li class="page-item {% if current_page == 1 %}disabled{% endif %} ">
            <a class="page-link" href="{{ url_for('pokemon.get_pokemon_list', page=current_page-1) }}">Previous</a>
        </li>
        <li class="page-item">
            <a class="page-link" href="{{ url_for('pokemon.get_pokemon_list', page=current_page+1) }}">Next</a>
        </li>
    </ul>
</nav>
{% endblock %}
