<!-- search.html -->
<div class="search-container">
    <input type="text" id="search-box" placeholder="Search Pokémon, Berry, etc.">
    <ul id="suggestions"></ul>
</div>

<script>
    $(document).ready(function() {
        $('#search-box').on('input', function() {
            const query = $(this).val();
            if (query.length > 0) {
                $.ajax({
                    url: '/search',
                    type: 'GET',
                    data: { q: query },
                    success: function(data) {
                        $('#suggestions').empty();
                        $.each(data, function(name, resource) {
                            $('#suggestions').append(`<li><a href="${generateUrl(resource, name)}">${name} (${resource})</a></li>`);
                        });
                    }
                });
            } else {
                $('#suggestions').empty();
            }
        });

        function generateUrl(resource, name) {
            const routes = {
                'pokemon': `/pokemon/${name}`,
                'berry': `/berry/${name}`,
                // Add other routes here
            };
            return routes[resource] || '#';
        }
    });
</script>

<style>
    .search-container {
        position: relative;
        width: 100%;
        max-width: 400px;
        margin: auto;
    }

    #search-box {
        width: 100%;
        padding: 10px;
        font-size: 16px;
    }

    #suggestions {
        list-style-type: none;
        padding: 0;
        margin: 0;
        background-color: white;
        border: 1px solid #ccc;
        max-height: 200px;
        overflow-y: auto;
        position: absolute;
        width: 100%;
    }

    #suggestions li {
        padding: 10px;
        cursor: pointer;
    }

    #suggestions li:hover {
        background-color: #f0f0f0;
    }

    #suggestions li a {
        text-decoration: none;
        color: black;
        display: block;
    }
</style>
