[uwsgi]
# The base directory for the application
chdir = /var/www/pokeAPI

# The Python WSGI application to serve
wsgi-file = app.py

# The callable that uWSGI should invoke to serve the application
callable = app

# Number of uWSGI worker processes
processes = 4

# Number of threads per worker process
threads = 2

# The socket to bind to
socket = /var/www/pokeAPI/pokeapi.sock

# Permissions for the socket
chmod-socket = 660

# Run as a specific user/group
uid = www-data
gid = www-data

# Ensure the app will restart on code changes (good for development, disable in production)
# touch-reload = /var/www/pokeAPI/app.py

# Logging
logto = /var/log/uwsgi/pokeapi.log

# Enable master process
master = true

# Enable virtualenv if applicable
# virtualenv = /path/to/venv

# Reload workers after this many requests (to prevent memory leaks)
max-requests = 5000

# Disable daemonization for easier debugging (remove for production)
# daemonize = /var/log/uwsgi/pokeapi.log

# Serve static files (optional)
# static-map = /static=/var/www/pokeAPI/static
