name: CI

on:
  push:
    branches:
      - main  # Run tests on pushes to the main branch
  pull_request:
    branches:
      - main  # Run tests on pull requests to the main branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Set up debug logging
        run: echo "ACTIONS_STEP_DEBUG=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # Adjust according to your environment

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Redis
        run: |
          while ! nc -z localhost 6379; do
            sleep 1
          done

      - name: Run tests
        env:
          FLASK_ENV: development
          FLASK_APP: app.py
          FLASK_DEBUG: 1
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest

      - name: Send webhook payload
        if: success()  # This ensures that the webhook is called only if tests pass
        run: |  
          payload='{}'
          signature=$(echo -n "$payload" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | sed 's/^.* //')
          curl -X POST -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            -d "$payload" \
            https://pokedexapi.com/webhook/
