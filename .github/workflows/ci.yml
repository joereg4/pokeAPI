name: CI

on:
  push:
    branches:
      - main  # Run tests on pushes to the main branch
  pull_request:
    branches:
      - main  # Run tests on pull requests to the main branch

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # Adjust according to your environment

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Send webhook payload
        if: success()  # This ensures that the webhook is called only if tests pass
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: sha256=$(echo -n ${{ secrets.WEBHOOK_SECRET }} | openssl dgst -sha256 -hmac ${{ secrets.WEBHOOK_SECRET }} | sed 's/^.* //')" \
          -d '{}' \
          https://pokedexapi.com/webhook/

