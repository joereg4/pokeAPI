name: CI

on:
  push:
    branches:
      - main  # Run tests on pushes to the main branch
  pull_request:
    branches:
      - main  # Run tests on PRs targeting main
  workflow_dispatch:  # Allow manually triggering the workflow

jobs:
  test:
    runs-on: ubuntu-24.04  # Explicitly using 24.04

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Set up debug logging
        run: echo "ACTIONS_STEP_DEBUG=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'  # Enable pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          CI: true
          FLASK_ENV: development
          FLASK_APP: app.py
          FLASK_DEBUG: 1
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pytest tests/ -n 12 -m "not integration" --tb=short

      - name: Send webhook payload
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "Skipping deploy webhook (DEPLOY_WEBHOOK_URL not set)"
            exit 0
          fi
          payload='{}'
          signature=$(echo -n "$payload" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/^.* //')
          curl -X POST -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            -d "$payload" \
            "$DEPLOY_WEBHOOK_URL"
