name: CI

on:
  push:
    branches:
      - main  # Run tests on pushes to the main branch
  workflow_dispatch:  # Allow manually triggering the workflow

jobs:
  test:
    runs-on: ubuntu-24.04  # Explicitly using 24.04

    services:
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Set up debug logging
        run: echo "ACTIONS_STEP_DEBUG=true" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'  # Enable pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          FLASK_ENV: development
          FLASK_APP: app.py
          FLASK_DEBUG: 1
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest -n 12

      - name: Send webhook payload
        if: success()  # Send webhook on successful tests
        run: |  
          payload='{}'
          signature=$(echo -n "$payload" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | sed 's/^.* //')
          curl -X POST -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            -d "$payload" \
            https://pokedexapi.com/webhook/
